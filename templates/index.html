<!DOCTYPE html>
<html>
<head>
    <title>IDPS Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>🚨 Intrusion Detection System</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Source IP</th>
            <th>Destination IP</th>
            <th>Protocol</th>
            <th>Time</th>
        </tr>

        {% for log in logs %}
        <tr>
            <td>{{log[0]}}</td>
            <td>{{log[1]}}</td>
            <td>{{log[2]}}</td>
            <td>{{log[3]}}</td>
            <td>{{log[4]}}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
